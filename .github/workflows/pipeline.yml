name: Node.js CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Test
        run: |
          npm install
          npm test

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Security Scan (npm audit)
        run: npm audit --audit-level=high

  build-image:
    needs: quality-and-security
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build-image.outputs.image }}
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-node-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Inspect ECR Scan Results
        run: |
          echo "Waiting for ECR scan to complete..."
          sleep 20 
          VULNS=$(aws ecr describe-image-scan-findings \
            --repository-name my-node-app \
            --image-id imageTag=${{ github.sha }} \
            --query 'imageScanFindings.findingSeverityCounts' \
            --output json)
          
          CRITICAL=$(echo $VULNS | jq '.CRITICAL // 0')
          HIGH=$(echo $VULNS | jq '.HIGH // 0')
          
          if [ "$CRITICAL" -gt 0 ] || [ "$HIGH" -gt 0 ]; then
            echo "Security Gate Failed: Found $CRITICAL Critical and $HIGH High vulnerabilities."
            exit 1
          fi

  deploy:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source (For Task Def)
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Deploy to AWS ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: task-definition.json
          service: node-app-service
          cluster: production-cluster
          image: ${{ needs.build-image.outputs.image_tag }}
          wait-for-service-stability: true

  notify:
    # Ensure it waits for all three individual jobs
    needs: [quality-and-security, build-image, deploy]
    runs-on: ubuntu-latest
    # This ensures the notification sends even if a previous step fails
    if: always()
    
    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          # Logic: Only 'Success' if ALL three jobs passed
          subject: |
            ${{ (needs.quality-and-security.result == 'success' && 
                 needs.build-image.result == 'success' && 
                 needs.deploy.result == 'success')
                 && 'Pipeline Success: All Stages Passed!'
                 || 'Pipeline Failed: Action Required' }}
          to: jagadeshkrish000@gmail.com
          from: ${{ secrets.MAIL_USERNAME }}
          body: |
            The pipeline for ${{ github.repository }} has finished.

            ---
            Summary of Stages:
            - Quality & Security: ${{ needs.quality-and-security.result }}
            - Build Image:       ${{ needs.build-image.result }}
            - Deploy to ECS:     ${{ needs.deploy.result }}
            ---

            Commit Message: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            
            View full logs and trace errors here: 
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
